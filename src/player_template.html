<!DOCTYPE html>
<html>
<head>
    <title>Fake HLS Player</title>
    <link rel="icon" type="image/png" href="/res/favicon.png">
    <style>
        body { background: #1a1a1a; color: #fff; font-family: Arial; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .title { display: flex; align-items: center; gap: 12px; }
        .title img { width: 36px; height: 36px; }
        video { width: 100%; background: #000; border-radius: 8px; }
        .info { background: #333; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .stream-id { color: #4CAF50; font-family: monospace; }
        code { background: #444; padding: 15px; display: block; border-radius: 8px; margin: 10px 0; word-break: break-all; }
        .copy-btn { background: #4CAF50; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title"><img src="/res/favicon.png" alt="E2HLS Logo">Fake HLS Stream Player</h1>
        <div class="info">
            <p>Stream ID: <span class="stream-id">{stream_id}</span></p>
            <p>Service: {service_ref}</p>
        </div>
        <div class="info">
            <h3>External Player URL (VLC, Roku)</h3>
            <code id="externalUrl">{external_url}</code>
            <button class="copy-btn" onclick="copyUrl()">Copy URL</button>
        </div>
        <video id="video" controls autoplay></video>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        const hlsUrl = '{hls_url}';
        function copyUrl() {
            navigator.clipboard.writeText(document.getElementById('externalUrl').textContent);
        }
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(hlsUrl);
            hls.attachMedia(video);
        }
    </script>
</body>
</html>
