# Static-analysis config. Presence of this file also switches the
# pre-commit hook's Python branch on (ruff + pytest on every commit).
[tool.pytest.ini_options]
# Keep collection out of the in-tree venv (Lib/) — without this pytest
# recurses into site-packages test files from the repo root.
testpaths = ["tests"]

[tool.ruff]
line-length = 100
# In-tree venv dirs (gitignored, belt and braces on machines where
# respect-gitignore does not kick in).
extend-exclude = ["Lib", "Scripts"]

[tool.ruff.lint]
# Default mechanical rule set (pycodestyle errors + pyflakes) — low
# noise and safe for the py2.7-compatible core: no modernisation or
# style-rewrite rules that would break box compatibility.
select = ["E4", "E7", "E9", "F"]
